openapi: 3.0.3
info:
  title: SmartQueue API
  description: |
    REST API для системы управления электронной очередью SmartQueue.

    ## Аутентификация
    Большинство эндпоинтов требуют **Bearer JWT токен**.  
    Получите токен через `POST /auth/register` или `POST /auth/login`, затем передайте в заголовке:
    ```
    Authorization: Bearer <token>
    ```
  version: 3.0.0

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Auth
    description: Регистрация, вход и информация о текущем пользователе
  - name: Service Points
    description: Точки обслуживания (окна / кассы)
  - name: Queues
    description: Очереди, привязанные к точкам обслуживания
  - name: Tickets
    description: Талоны в очереди
  - name: Stats
    description: Статистика очереди и информационное табло

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    # ── USER ──────────────────────────────────
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        first_name:
          type: string
          example: Aibek
        last_name:
          type: string
          example: Seitkali
        phone:
          type: string
          example: "+77011234567"
        priority_category:
          type: string
          enum: [none, pregnant, elderly, disabled]
          example: none
          description: Категория приоритета пользователя
        service_point_id:
          type: integer
          example: 0
          description: ID точки обслуживания, к которой привязан пользователь (0 если не привязан)
        created_at:
          type: string
          format: date-time

    RegisterRequest:
      type: object
      required: [first_name, last_name, phone, password]
      properties:
        first_name:
          type: string
          example: Aibek
        last_name:
          type: string
          example: Seitkali
        phone:
          type: string
          example: "+77011234567"
        password:
          type: string
          format: password
          example: strongpassword123
        priority_category:
          type: string
          enum: [none, pregnant, elderly, disabled]
          default: none
          example: none

    LoginRequest:
      type: object
      required: [phone, password]
      properties:
        phone:
          type: string
          example: "+77011234567"
        password:
          type: string
          format: password
          example: strongpassword123

    AuthResponse:
      type: object
      properties:
        message:
          type: string
          example: login successful
        user:
          $ref: '#/components/schemas/User'
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

    # ── SERVICE POINT ─────────────────────────
    ServicePoint:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Window 1
        description:
          type: string
          example: Documents and certificates

    ServicePointRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: Window 1
        description:
          type: string
          example: Documents and certificates

    # ── QUEUE ─────────────────────────────────
    Queue:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: General Queue
        service_point_id:
          type: integer
          example: 1
        is_open:
          type: boolean
          example: true
          description: Открыта ли очередь для приёма талонов

    QueueRequest:
      type: object
      required: [name, service_point_id]
      properties:
        name:
          type: string
          example: General Queue
        service_point_id:
          type: integer
          example: 1
        is_open:
          type: boolean
          default: true
          example: true

    # ── TICKET ────────────────────────────────
    Ticket:
      type: object
      properties:
        id:
          type: integer
          example: 42
        queue_id:
          type: integer
          example: 1
        number:
          type: integer
          example: 15
        status:
          type: string
          enum: [waiting, called, skipped, completed]
          example: waiting
        recall_count:
          type: integer
          example: 0
        is_priority:
          type: boolean
          example: false
          description: true если пользователь имеет приоритетную категорию (pregnant/elderly/disabled)

    TakeTicketRequest:
      type: object
      required: [queue_id]
      properties:
        queue_id:
          type: integer
          example: 1

    TicketActionResponse:
      type: object
      properties:
        message:
          type: string
          example: ticket called
        ticket:
          $ref: '#/components/schemas/Ticket'

    PositionResponse:
      type: object
      properties:
        ticket_id:
          type: integer
          example: 42
        position:
          type: integer
          example: 3

    # ── DISPLAY / STATS ───────────────────────
    QueueDisplayTicket:
      type: object
      properties:
        id:
          type: integer
          example: 42
        ticket_number:
          type: string
          example: "015"
        status:
          type: string
          enum: [waiting, called, skipped, completed]
          example: called
        recall_count:
          type: integer
          example: 1
        is_priority:
          type: boolean
          example: true

    QueueDisplay:
      type: object
      properties:
        queue_id:
          type: integer
          example: 1
        queue_name:
          type: string
          example: General Queue
        current_ticket:
          $ref: '#/components/schemas/QueueDisplayTicket'
          nullable: true
        waiting_tickets:
          type: array
          items:
            $ref: '#/components/schemas/QueueDisplayTicket'
        completed_count:
          type: integer
          example: 7

    QueueStats:
      type: object
      properties:
        queue_id:
          type: integer
          example: 1
        total_tickets:
          type: integer
          example: 20
        waiting_tickets:
          type: integer
          example: 5
        called_tickets:
          type: integer
          example: 1
        completed_tickets:
          type: integer
          example: 12
        skipped_tickets:
          type: integer
          example: 2

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: unauthorized

# ─────────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────────
paths:

  # ── AUTH ──────────────────────────────────
  /auth/register:
    post:
      tags: [Auth]
      summary: Регистрация нового пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              first_name: Aibek
              last_name: Seitkali
              phone: "+77011234567"
              password: strongpassword123
              priority_category: none
      responses:
        '201':
          description: Регистрация прошла успешно
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Пользователь с таким телефоном уже существует
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags: [Auth]
      summary: Вход и получение JWT токена
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              phone: "+77011234567"
              password: strongpassword123
      responses:
        '200':
          description: Вход успешен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Неверные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/me:
    get:
      tags: [Auth]
      summary: Получить данные текущего пользователя
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Данные пользователя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── SERVICE POINTS ────────────────────────
  /servicepoints:
    get:
      tags: [Service Points]
      summary: Получить все точки обслуживания
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Список точек обслуживания
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ServicePoint'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Service Points]
      summary: Создать точку обслуживания
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServicePointRequest'
            example:
              name: Window 1
              description: Documents and certificates
      responses:
        '201':
          description: Точка обслуживания создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServicePoint'
        '400':
          description: Неверное тело запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── QUEUES ────────────────────────────────
  /queues:
    get:
      tags: [Queues]
      summary: Получить все очереди
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Список очередей
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Queue'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Queues]
      summary: Создать очередь
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueueRequest'
            example:
              name: General Queue
              service_point_id: 1
              is_open: true
      responses:
        '201':
          description: Очередь создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Queue'
        '400':
          description: Неверный запрос
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Точка обслуживания не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /servicepoints/{id}/queues:
    get:
      tags: [Queues]
      summary: Получить очереди по точке обслуживания
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID точки обслуживания
          example: 1
      responses:
        '200':
          description: Список очередей точки обслуживания
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Queue'
        '400':
          description: Неверный ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /queues/{id}/display:
    get:
      tags: [Stats]
      summary: Информационное табло очереди
      description: Возвращает текущий талон, список ожидающих и счётчик завершённых
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID очереди
          example: 1
      responses:
        '200':
          description: Данные табло
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueDisplay'
        '400':
          description: Неверный ID очереди
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Очередь не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /queues/{id}/stats:
    get:
      tags: [Stats]
      summary: Статистика очереди
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID очереди
          example: 1
      responses:
        '200':
          description: Статистика
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueStats'
        '400':
          description: Неверный ID очереди
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Очередь не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── TICKETS ───────────────────────────────
  /tickets:
    get:
      tags: [Tickets]
      summary: Получить все талоны
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Список талонов
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ticket'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Tickets]
      summary: Взять талон (встать в очередь)
      description: |
        Создаёт талон для текущего авторизованного пользователя.  
        Если у пользователя `priority_category` != `none`, талон автоматически получает `is_priority: true`
        и ставится перед обычными ожидающими талонами.  
        Нельзя взять талон в закрытую очередь (`is_open: false`).
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TakeTicketRequest'
            example:
              queue_id: 1
      responses:
        '201':
          description: Талон создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticket'
        '400':
          description: Неверный ID очереди или очередь закрыта
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Очередь не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tickets/{id}/position:
    get:
      tags: [Tickets]
      summary: Позиция талона в очереди
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID талона
          example: 42
      responses:
        '200':
          description: Позиция талона
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PositionResponse'
        '400':
          description: Неверный ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Талон не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tickets/{id}/call-skipped:
    post:
      tags: [Tickets]
      summary: Вызвать ранее пропущенный талон
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID талона
          example: 42
      responses:
        '200':
          description: Талон вызван повторно
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketActionResponse'
        '400':
          description: Неверный ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Талон не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Талон не в статусе skipped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /queues/{id}/tickets/call-next:
    post:
      tags: [Tickets]
      summary: Вызвать следующий талон из очереди
      description: "Приоритетные талоны (is_priority=true) вызываются первыми"
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID очереди
          example: 1
      responses:
        '200':
          description: Талон вызван
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketActionResponse'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Нет ожидающих талонов или уже есть активный талон
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /queues/{id}/tickets/recall-current:
    post:
      tags: [Tickets]
      summary: Повторно вызвать текущий талон
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID очереди
          example: 1
      responses:
        '200':
          description: Талон вызван повторно
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketActionResponse'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Нет активного талона для повторного вызова
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /queues/{id}/tickets/skip-current:
    post:
      tags: [Tickets]
      summary: Пропустить текущий талон
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID очереди
          example: 1
      responses:
        '200':
          description: Талон пропущен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketActionResponse'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Нет активного талона для пропуска
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /queues/{id}/tickets/complete-current:
    post:
      tags: [Tickets]
      summary: Завершить обслуживание текущего талона
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID очереди
          example: 1
      responses:
        '200':
          description: Талон завершён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketActionResponse'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Нет активного талона для завершения
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'