services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartqueue-api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-smartqueue}
      DB_PASSWORD: ${DB_PASSWORD:-smartqueue_password}
      DB_NAME: ${DB_NAME:-smartqueue}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    ports:
      - "8080:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - smartqueue

  migrate:
    image: postgres:16-alpine
    container_name: smartqueue-migrate
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ${DB_USER:-smartqueue}
      PGPASSWORD: ${DB_PASSWORD:-smartqueue_password}
      PGDATABASE: ${DB_NAME:-smartqueue}
    volumes:
      - ./migrations/000004_queue_is_open.up.sql:/migrations/000004_queue_is_open.up.sql:ro
    command: ["psql", "-v", "ON_ERROR_STOP=1", "-f", "/migrations/000004_queue_is_open.up.sql"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - smartqueue

  postgres:
    image: postgres:16-alpine
    container_name: smartqueue-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-smartqueue}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smartqueue_password}
      POSTGRES_DB: ${DB_NAME:-smartqueue}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/000001_init_tables.up.sql:/docker-entrypoint-initdb.d/000001_init_tables.sql:ro
      - ./migrations/000002_ticket_recall_workflow.up.sql:/docker-entrypoint-initdb.d/000002_ticket_recall_workflow.sql:ro
      - ./migrations/000003_priority_queue.up.sql:/docker-entrypoint-initdb.d/000003_priority_queue.sql:ro
      - ./migrations/000004_queue_is_open.up.sql:/docker-entrypoint-initdb.d/000004_queue_is_open.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - smartqueue

volumes:
  postgres_data:

networks:
  smartqueue:
    name: smartqueue_network
    driver: bridge
